<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Kanban Task Manager</title>
    <link rel="stylesheet" href="pro.css">
</head>
<body>

<div class="app">

    <header>
        <div>
            <h1>Kanban Board</h1>
            <p>Organize your workflow efficiently</p>
        </div>
        <button id="openModal">+ New Task</button>
    </header>

    <div class="board">

        <div class="column">
            <h2>To Do</h2>
            <div class="task-list" id="todo"></div>
        </div>

        <div class="column">
            <h2>In Progress</h2>
            <div class="task-list" id="progress"></div>
        </div>

        <div class="column">
            <h2>Completed</h2>
            <div class="task-list" id="done"></div>
        </div>

    </div>

</div>

<!-- Modal -->
<div class="modal" id="taskModal">
    <div class="modal-content">
        <h3>Add Task</h3>

        <input type="text" id="taskTitle" placeholder="Task Title">
        <textarea id="taskDesc" placeholder="Task Description"></textarea>

        <select id="taskColumn">
            <option value="todo">To Do</option>
            <option value="progress">In Progress</option>
            <option value="done">Completed</option>
        </select>

        <div class="modal-buttons">
            <button id="saveTask">Save</button>
            <button id="cancelTask" class="secondary">Cancel</button>
        </div>
    </div>
</div>

<script src="pro.js"></script>
</body>
</html>
